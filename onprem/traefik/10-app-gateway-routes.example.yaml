apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: hospital-web-gateway
  namespace: hospital-prod
spec:
  gatewayClassName: traefik
  listeners:
    - name: web
      protocol: HTTP
      port: 8000
      hostname: benhvien.teamdevops.shop
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hospital-web-route
  namespace: hospital-prod
spec:
  parentRefs:
    - name: hospital-web-gateway
  hostnames:
    - benhvien.teamdevops.shop
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: be-service-v1
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: fe-service-v1
          port: 80
