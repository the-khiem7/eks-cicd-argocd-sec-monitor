services:
  consul:
    image: ${CONSUL_IMAGE:-hashicorp/consul:1.19}
    container_name: ${CONSUL_CONTAINER_NAME:-haproxy-consul}
    restart: unless-stopped
    command:
      - agent
      - -dev
      - -client=0.0.0.0
      - -log-level=INFO
    ports:
      - "${CONSUL_HTTP_PORT:-127.0.0.1:8500}:8500"

  haproxy:
    image: haproxy:2.9
    container_name: ${HAPROXY_CONTAINER_NAME:-haproxy-alb}
    restart: unless-stopped
    depends_on:
      - consul
    ports:
      - "${HAPROXY_HTTP_PORT:-80}:80"
      - "${HAPROXY_HTTPS_PORT:-443}:443"
    volumes:
      - ./generated:/usr/local/etc/haproxy/generated:ro
      - ./certs:/usr/local/etc/haproxy/certs:ro
    command:
      - sh
      - -ec
      - |
        while [ ! -s "/usr/local/etc/haproxy/${HAPROXY_CONFIG:-generated/haproxy.cfg}" ]; do
          echo "waiting for generated HAProxy config..."
          sleep 2
        done
        exec haproxy -W -db -f "/usr/local/etc/haproxy/${HAPROXY_CONFIG:-generated/haproxy.cfg}"

  consul-template:
    image: ${CONSUL_TEMPLATE_IMAGE:-hashicorp/consul-template:latest}
    container_name: ${CONSUL_TEMPLATE_CONTAINER_NAME:-haproxy-consul-template}
    restart: unless-stopped
    depends_on:
      - consul
      - haproxy
    pid: "service:haproxy"
    environment:
      HAPROXY_TLS_CERT: ${HAPROXY_TLS_CERT:-}
    volumes:
      - ./templates:/consul-template/templates:ro
      - ./consul-template:/consul-template/config:ro
      - ./generated:/generated
    command:
      - consul-template
      - -config=/consul-template/config/consul-template.hcl

  k8s-discovery:
    image: ${K8S_DISCOVERY_IMAGE:-alpine/k8s:1.30.14}
    container_name: ${K8S_DISCOVERY_CONTAINER_NAME:-haproxy-k8s-discovery}
    restart: unless-stopped
    depends_on:
      - consul
    environment:
      KUBECONFIG: /kubeconfig/config
      CONSUL_HTTP_ADDR: http://consul:8500
      SERVICE_NAME: ${SERVICE_NAME:-traefik-nodeport}
      SERVICE_PORT: ${TRAEFIK_NODEPORT:-30080}
      NODE_ADDRESS_TYPE: ${NODE_ADDRESS_TYPE:-InternalIP}
      DISCOVERY_INTERVAL_SECONDS: ${DISCOVERY_INTERVAL_SECONDS:-15}
      CONSUL_DEREGISTER_CRITICAL_AFTER: ${CONSUL_DEREGISTER_CRITICAL_AFTER:-1m}
    volumes:
      - ${KUBECONFIG_PATH:-./kubeconfig/config}:/kubeconfig/config:ro
      - ./scripts:/scripts:ro
    command: ["/bin/sh", "/scripts/k8s-node-discovery.sh"]
