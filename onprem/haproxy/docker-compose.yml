services:
  haproxy:
    image: haproxy:2.9
    container_name: ${HAPROXY_CONTAINER_NAME:-haproxy-alb}
    restart: unless-stopped
    ports:
      - "${HAPROXY_HTTP_PORT:-80}:80"
      - "${HAPROXY_HTTPS_PORT:-443}:443"
    volumes:
      - ./:/usr/local/etc/haproxy:ro
    command: ["haproxy", "-W", "-db", "-f", "/usr/local/etc/haproxy/${HAPROXY_CONFIG:-haproxy.cfg}"]
