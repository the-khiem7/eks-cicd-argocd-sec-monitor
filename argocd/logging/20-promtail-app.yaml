apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    targetRevision: ">=0.0.0"
    helm:
      releaseName: promtail
      values: |
        config:
          clients:
            - url: http://loki-gateway.logging.svc.cluster.local/loki/api/v1/push

        serviceMonitor:
          enabled: true

        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 150m
            memory: 128Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: logging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
