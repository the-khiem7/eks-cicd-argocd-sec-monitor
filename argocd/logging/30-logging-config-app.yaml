apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: logging-config
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Kien-devops/eks-cicd-argocd-sec-monitor.git
    targetRevision: main
    path: k8s/logging

  destination:
    server: https://kubernetes.default.svc
    namespace: logging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
