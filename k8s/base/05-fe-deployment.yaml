# Run the hospital frontend from the ECR image.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe-deployment-v1
  namespace: hospital
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fe-v1
  template:
    metadata:
      labels:
        app: fe-v1
    spec:
      imagePullSecrets:
        - name: ecr-registry-secret
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: fe-v1
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 2000
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      containers:
        - name: fe-v1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          image: 606030503959.dkr.ecr.us-east-1.amazonaws.com/ecr-fe:ea729165289e467954dc42f2cb0bc3597dc841c4
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /
              port: 8000
            periodSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
