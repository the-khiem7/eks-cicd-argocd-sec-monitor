# Run the hospital backend API from the ECR image.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: be-deployment-v1
  namespace: hospital
spec:
  replicas: 2
  selector:
    matchLabels:
      app: be-v1
  template:
    metadata:
      labels:
        app: be-v1
    spec:
      imagePullSecrets:
        - name: ecr-registry-secret

      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        fsGroup: 2000

      volumes:
        - name: be-uploads
          emptyDir: {}

      initContainers:
        - name: init-uploads-permission
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /uploads/images
              chown -R 1654:2000 /uploads
              chmod -R 775 /uploads
          volumeMounts:
            - name: be-uploads
              mountPath: /uploads
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      containers:
        - name: be-v1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          image: 606030503959.dkr.ecr.us-east-1.amazonaws.com/ecr-be:ea729165289e467954dc42f2cb0bc3597dc841c4
          imagePullPolicy: Always

          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: be-db-secret
                  key: default-connection
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: be-redis-secret
                  key: connection-string

          ports:
            - containerPort: 8080

          volumeMounts:
            - name: be-uploads
              mountPath: /app/wwwroot/uploads

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
